version: "3.9"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cielo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: cielo_fashion
      MYSQL_USER: ${MYSQL_USER:-cielo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cielopassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cielo_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 5s

  # Next.js App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cielo_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-cielo}:${MYSQL_PASSWORD:-cielopassword}@mysql:3306/cielo_fashion
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cielo_network

  # Nginx Reverse Proxy (SSL-ready)
  nginx:
    image: nginx:alpine
    container_name: cielo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - cielo_network

volumes:
  mysql_data:
    driver: local

networks:
  cielo_network:
    driver: bridge
